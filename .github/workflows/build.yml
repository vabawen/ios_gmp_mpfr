# .github/workflows/build-ios-deps.yml
name: Build GMP & MPFR for iOS

on:
  workflow_dispatch:

jobs:
  build-gmp-mpfr:
    runs-on: macos-14
    timeout-minutes: 40

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install build tools
        run: brew install autoconf automake libtool wget texinfo

      # ================================
      # 下载源码
      # ================================
      - name: Download sources
        run: |
          mkdir -p sources
          cd sources

          echo "Downloading GMP..."
          wget https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          tar xf gmp-6.3.0.tar.xz

          echo "Downloading MPFR..."
          wget https://www.mpfr.org/mpfr-current/mpfr-4.2.2.tar.xz
          tar xf mpfr-4.2.2.tar.xz

          echo "✅ Sources ready"

      # ================================
      # GMP - arm64 真机
      # ================================
      - name: Build GMP (arm64 device)
        run: |
          GMP_SRC="${GITHUB_WORKSPACE}/sources/gmp-6.3.0"
          PREFIX="${GITHUB_WORKSPACE}/build/gmp/ios-arm64"
          BUILD_DIR=$(mktemp -d)
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)

          mkdir -p "${PREFIX}"
          cd "${BUILD_DIR}"

          CC="$(xcrun --sdk iphoneos -f clang)" \
          AR="$(xcrun --sdk iphoneos -f ar)" \
          RANLIB="$(xcrun --sdk iphoneos -f ranlib)" \
          CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -miphoneos-version-min=12.0 -O2 -fPIC" \
          ${GMP_SRC}/configure \
            --host=aarch64-apple-darwin \
            --prefix="${PREFIX}" \
            --enable-static \
            --disable-shared \
            --disable-assembly

          make -j$(sysctl -n hw.ncpu)
          make install

          echo "✅ GMP arm64 device done"

      # ================================
      # GMP - arm64 模拟器（M1 Mac）
      # ================================
      - name: Build GMP (arm64 simulator)
        run: |
          GMP_SRC="${GITHUB_WORKSPACE}/sources/gmp-6.3.0"
          PREFIX="${GITHUB_WORKSPACE}/build/gmp/sim-arm64"
          BUILD_DIR=$(mktemp -d)
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)

          mkdir -p "${PREFIX}"
          cd "${BUILD_DIR}"

          CC="$(xcrun --sdk iphonesimulator -f clang)" \
          AR="$(xcrun --sdk iphonesimulator -f ar)" \
          RANLIB="$(xcrun --sdk iphonesimulator -f ranlib)" \
          CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -mios-simulator-version-min=12.0 -O2 -fPIC -target arm64-apple-ios12.0-simulator" \
          ${GMP_SRC}/configure \
            --host=aarch64-apple-darwin \
            --prefix="${PREFIX}" \
            --enable-static \
            --disable-shared \
            --disable-assembly

          make -j$(sysctl -n hw.ncpu)
          make install

          echo "✅ GMP arm64 simulator done"

      # ================================
      # GMP - x86_64 模拟器（Intel Mac）
      # ================================
      - name: Build GMP (x86_64 simulator)
        run: |
          GMP_SRC="${GITHUB_WORKSPACE}/sources/gmp-6.3.0"
          PREFIX="${GITHUB_WORKSPACE}/build/gmp/sim-x86_64"
          BUILD_DIR=$(mktemp -d)
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)

          mkdir -p "${PREFIX}"
          cd "${BUILD_DIR}"

          CC="$(xcrun --sdk iphonesimulator -f clang)" \
          AR="$(xcrun --sdk iphonesimulator -f ar)" \
          RANLIB="$(xcrun --sdk iphonesimulator -f ranlib)" \
          CFLAGS="-arch x86_64 -isysroot ${SDK_PATH} -mios-simulator-version-min=12.0 -O2 -fPIC" \
          ${GMP_SRC}/configure \
            --host=x86_64-apple-darwin \
            --prefix="${PREFIX}" \
            --enable-static \
            --disable-shared \
            --disable-assembly

          make -j$(sysctl -n hw.ncpu)
          make install

          echo "✅ GMP x86_64 simulator done"

      # ================================
      # MPFR - arm64 真机
      # ================================
      - name: Build MPFR (arm64 device)
        run: |
          MPFR_SRC="${GITHUB_WORKSPACE}/sources/mpfr-4.2.2"
          GMP="${GITHUB_WORKSPACE}/build/gmp/ios-arm64"
          PREFIX="${GITHUB_WORKSPACE}/build/mpfr/ios-arm64"
          BUILD_DIR=$(mktemp -d)
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)

          mkdir -p "${PREFIX}"
          cd "${BUILD_DIR}"

          CC="$(xcrun --sdk iphoneos -f clang)" \
          AR="$(xcrun --sdk iphoneos -f ar)" \
          RANLIB="$(xcrun --sdk iphoneos -f ranlib)" \
          CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -miphoneos-version-min=12.0 -O2 -fPIC -I${GMP}/include" \
          LDFLAGS="-arch arm64 -isysroot ${SDK_PATH} -L${GMP}/lib" \
          ${MPFR_SRC}/configure \
            --host=aarch64-apple-darwin \
            --prefix="${PREFIX}" \
            --with-gmp="${GMP}" \
            --enable-static \
            --disable-shared

          make -j$(sysctl -n hw.ncpu)
          make install

          echo "✅ MPFR arm64 device done"

      # ================================
      # MPFR - arm64 模拟器
      # ================================
      - name: Build MPFR (arm64 simulator)
        run: |
          MPFR_SRC="${GITHUB_WORKSPACE}/sources/mpfr-4.2.2"
          GMP="${GITHUB_WORKSPACE}/build/gmp/sim-arm64"
          PREFIX="${GITHUB_WORKSPACE}/build/mpfr/sim-arm64"
          BUILD_DIR=$(mktemp -d)
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)

          mkdir -p "${PREFIX}"
          cd "${BUILD_DIR}"

          CC="$(xcrun --sdk iphonesimulator -f clang)" \
          AR="$(xcrun --sdk iphonesimulator -f ar)" \
          RANLIB="$(xcrun --sdk iphonesimulator -f ranlib)" \
          CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -mios-simulator-version-min=12.0 -O2 -fPIC -I${GMP}/include -target arm64-apple-ios12.0-simulator" \
          LDFLAGS="-arch arm64 -isysroot ${SDK_PATH} -L${GMP}/lib" \
          ${MPFR_SRC}/configure \
            --host=aarch64-apple-darwin \
            --prefix="${PREFIX}" \
            --with-gmp="${GMP}" \
            --enable-static \
            --disable-shared

          make -j$(sysctl -n hw.ncpu)
          make install

          echo "✅ MPFR arm64 simulator done"

      # ================================
      # MPFR - x86_64 模拟器
      # ================================
      - name: Build MPFR (x86_64 simulator)
        run: |
          MPFR_SRC="${GITHUB_WORKSPACE}/sources/mpfr-4.2.2"
          GMP="${GITHUB_WORKSPACE}/build/gmp/sim-x86_64"
          PREFIX="${GITHUB_WORKSPACE}/build/mpfr/sim-x86_64"
          BUILD_DIR=$(mktemp -d)
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)

          mkdir -p "${PREFIX}"
          cd "${BUILD_DIR}"

          CC="$(xcrun --sdk iphonesimulator -f clang)" \
          AR="$(xcrun --sdk iphonesimulator -f ar)" \
          RANLIB="$(xcrun --sdk iphonesimulator -f ranlib)" \
          CFLAGS="-arch x86_64 -isysroot ${SDK_PATH} -mios-simulator-version-min=12.0 -O2 -fPIC -I${GMP}/include" \
          LDFLAGS="-arch x86_64 -isysroot ${SDK_PATH} -L${GMP}/lib" \
          ${MPFR_SRC}/configure \
            --host=x86_64-apple-darwin \
            --prefix="${PREFIX}" \
            --with-gmp="${GMP}" \
            --enable-static \
            --disable-shared

          make -j$(sysctl -n hw.ncpu)
          make install

          echo "✅ MPFR x86_64 simulator done"

      # ================================
      # 打包所有产物
      # ================================
      - name: Package libraries
        run: |
          mkdir -p output

          echo "=== GMP 产物 ==="
          find build/gmp -name "*.a" -exec ls -lh {} \;

          echo ""
          echo "=== MPFR 产物 ==="
          find build/mpfr -name "*.a" -exec ls -lh {} \;

          # 打包完整目录结构
          tar czf output/ios-gmp-mpfr.tar.gz \
            build/gmp/ios-arm64/lib/ build/gmp/ios-arm64/include/ \
            build/gmp/sim-arm64/lib/ build/gmp/sim-arm64/include/ \
            build/gmp/sim-x86_64/lib/ build/gmp/sim-x86_64/include/ \
            build/mpfr/ios-arm64/lib/ build/mpfr/ios-arm64/include/ \
            build/mpfr/sim-arm64/lib/ build/mpfr/sim-arm64/include/ \
            build/mpfr/sim-x86_64/lib/ build/mpfr/sim-x86_64/include/

          echo ""
          echo "✅ 打包完成"
          ls -lh output/

      # ================================
      # 上传
      # ================================
      - name: Upload GMP & MPFR libraries
        uses: actions/upload-artifact@v4
        with:
          name: ios-gmp-mpfr
          path: output/ios-gmp-mpfr.tar.gz
          retention-days: 90