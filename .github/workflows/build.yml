name: Build iOS Dependencies

# 什么时候触发这个工作流
on:
  # 手动触发（在 GitHub 网页上点按钮）
  workflow_dispatch:
  
  # 或者也可以在 push 时触发（但编译很慢，建议手动）
  # push:
  #   branches: [main]
  #   paths:
  #     - 'third_party/**'

jobs:
  build-ios-libs:
    # 使用 GitHub 提供的 macOS 虚拟机
    runs-on: macos-14        # macos-14 = M1 Mac, macos-13 = Intel
    
    # 超时设置（GMP+MPFR 编译大约 10-20 分钟）
    timeout-minutes: 30
    
    steps:
      # 1. 拉取你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装编译工具
      - name: Install build tools
        run: |
          brew install autoconf automake libtool texinfo wget

      # 3. 下载并编译 GMP for iOS
      - name: Download GMP source
        run: |
          cd third_party/gmp
          mkdir -p source && cd source
          wget https://gmplib.org/download/gmp/gmp-6.3.0.tar.xz
          tar xf gmp-6.3.0.tar.xz

      - name: Build GMP for iOS (arm64 device)
        run: |
          GMP_SRC="${GITHUB_WORKSPACE}/third_party/gmp/source/gmp-6.3.0"
          PREFIX="${GITHUB_WORKSPACE}/third_party/gmp/ios/arm64"
          BUILD_DIR="/tmp/gmp_ios_arm64"
          
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          mkdir -p "${BUILD_DIR}" "${PREFIX}"
          cd "${BUILD_DIR}"
          
          CC="$(xcrun --sdk iphoneos -f clang)" \
          AR="$(xcrun --sdk iphoneos -f ar)" \
          RANLIB="$(xcrun --sdk iphoneos -f ranlib)" \
          CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -miphoneos-version-min=12.0 -O2 -fPIC" \
          ${GMP_SRC}/configure \
              --host=aarch64-apple-darwin \
              --prefix="${PREFIX}" \
              --enable-static \
              --disable-shared \
              --disable-assembly
          
          make -j$(sysctl -n hw.ncpu)
          make install
          
          echo "✅ GMP iOS arm64 done"
          ls -lh "${PREFIX}/lib/"

      - name: Build GMP for iOS Simulator (x86_64)
        run: |
          GMP_SRC="${GITHUB_WORKSPACE}/third_party/gmp/source/gmp-6.3.0"
          PREFIX="${GITHUB_WORKSPACE}/third_party/gmp/ios/x86_64-simulator"
          BUILD_DIR="/tmp/gmp_ios_x86_64"
          
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          
          mkdir -p "${BUILD_DIR}" "${PREFIX}"
          cd "${BUILD_DIR}"
          
          CC="$(xcrun --sdk iphonesimulator -f clang)" \
          AR="$(xcrun --sdk iphonesimulator -f ar)" \
          RANLIB="$(xcrun --sdk iphonesimulator -f ranlib)" \
          CFLAGS="-arch x86_64 -isysroot ${SDK_PATH} -mios-simulator-version-min=12.0 -O2 -fPIC" \
          ${GMP_SRC}/configure \
              --host=x86_64-apple-darwin \
              --prefix="${PREFIX}" \
              --enable-static \
              --disable-shared \
              --disable-assembly
          
          make -j$(sysctl -n hw.ncpu)
          make install

      # 4. 下载并编译 MPFR for iOS
      - name: Download MPFR source
        run: |
          cd third_party/mpfr
          mkdir -p source && cd source
          wget https://www.mpfr.org/mpfr-current/mpfr-4.2.2.tar.xz
          tar xf mpfr-4.2.2.tar.xz

      - name: Build MPFR for iOS (arm64 device)
        run: |
          MPFR_SRC="${GITHUB_WORKSPACE}/third_party/mpfr/source/mpfr-4.2.2"
          GMP_DIR="${GITHUB_WORKSPACE}/third_party/gmp/ios/arm64"
          PREFIX="${GITHUB_WORKSPACE}/third_party/mpfr/ios/arm64"
          BUILD_DIR="/tmp/mpfr_ios_arm64"
          
          SDK_PATH=$(xcrun --sdk iphoneos --show-sdk-path)
          
          mkdir -p "${BUILD_DIR}" "${PREFIX}"
          cd "${BUILD_DIR}"
          
          CC="$(xcrun --sdk iphoneos -f clang)" \
          AR="$(xcrun --sdk iphoneos -f ar)" \
          RANLIB="$(xcrun --sdk iphoneos -f ranlib)" \
          CFLAGS="-arch arm64 -isysroot ${SDK_PATH} -miphoneos-version-min=12.0 -O2 -fPIC -I${GMP_DIR}/include" \
          LDFLAGS="-arch arm64 -isysroot ${SDK_PATH} -L${GMP_DIR}/lib" \
          ${MPFR_SRC}/configure \
              --host=aarch64-apple-darwin \
              --prefix="${PREFIX}" \
              --with-gmp="${GMP_DIR}" \
              --enable-static \
              --disable-shared
          
          make -j$(sysctl -n hw.ncpu)
          make install
          
          echo "✅ MPFR iOS arm64 done"

      - name: Build MPFR for iOS Simulator (x86_64)
        run: |
          MPFR_SRC="${GITHUB_WORKSPACE}/third_party/mpfr/source/mpfr-4.2.2"
          GMP_DIR="${GITHUB_WORKSPACE}/third_party/gmp/ios/x86_64-simulator"
          PREFIX="${GITHUB_WORKSPACE}/third_party/mpfr/ios/x86_64-simulator"
          BUILD_DIR="/tmp/mpfr_ios_x86_64"
          
          SDK_PATH=$(xcrun --sdk iphonesimulator --show-sdk-path)
          
          mkdir -p "${BUILD_DIR}" "${PREFIX}"
          cd "${BUILD_DIR}"
          
          CC="$(xcrun --sdk iphonesimulator -f clang)" \
          AR="$(xcrun --sdk iphonesimulator -f ar)" \
          RANLIB="$(xcrun --sdk iphonesimulator -f ranlib)" \
          CFLAGS="-arch x86_64 -isysroot ${SDK_PATH} -mios-simulator-version-min=12.0 -O2 -fPIC -I${GMP_DIR}/include" \
          LDFLAGS="-arch x86_64 -isysroot ${SDK_PATH} -L${GMP_DIR}/lib" \
          ${MPFR_SRC}/configure \
              --host=x86_64-apple-darwin \
              --prefix="${PREFIX}" \
              --with-gmp="${GMP_DIR}" \
              --enable-static \
              --disable-shared
          
          make -j$(sysctl -n hw.ncpu)
          make install

      # 5. 打包所有 iOS 产物
      - name: Package iOS libraries
        run: |
          cd ${GITHUB_WORKSPACE}
          
          echo "=== GMP files ==="
          find third_party/gmp/ios -name "*.a" -o -name "*.h" | head -20
          
          echo "=== MPFR files ==="
          find third_party/mpfr/ios -name "*.a" -o -name "*.h" | head -20
          
          # 创建一个干净的分发目录
          mkdir -p ios_prebuilt/{arm64,x86_64-simulator}/{lib,include}
          
          # arm64 (真机)
          cp third_party/gmp/ios/arm64/lib/libgmp.a    ios_prebuilt/arm64/lib/
          cp third_party/mpfr/ios/arm64/lib/libmpfr.a   ios_prebuilt/arm64/lib/
          cp third_party/gmp/ios/arm64/include/*.h       ios_prebuilt/arm64/include/
          cp third_party/mpfr/ios/arm64/include/*.h      ios_prebuilt/arm64/include/
          
          # x86_64 (模拟器)
          cp third_party/gmp/ios/x86_64-simulator/lib/libgmp.a    ios_prebuilt/x86_64-simulator/lib/
          cp third_party/mpfr/ios/x86_64-simulator/lib/libmpfr.a   ios_prebuilt/x86_64-simulator/lib/
          cp third_party/gmp/ios/x86_64-simulator/include/*.h       ios_prebuilt/x86_64-simulator/include/
          cp third_party/mpfr/ios/x86_64-simulator/include/*.h      ios_prebuilt/x86_64-simulator/include/
          
          tar czf ios-prebuilt-libs.tar.gz ios_prebuilt/
          
          echo "✅ Package done"
          ls -lh ios-prebuilt-libs.tar.gz

      # 6. 上传产物（可以在 GitHub 页面下载）
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-prebuilt-libs
          path: ios-prebuilt-libs.tar.gz
          retention-days: 90    # 保留90天